<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/html">
<head>
    <title>Richard's Registration Form</title>
</head>

<style>
    .button {
  font: bold 11px Arial;
  text-decoration: none;
  background-color: #EEEEEE;
  color: #333333;
  padding: 2px 6px 2px 6px;
  border-top: 1px solid #CCCCCC;
  border-right: 1px solid #333333;
  border-bottom: 1px solid #333333;
  border-left: 1px solid #CCCCCC;
}

</style>
<body bgcolor="red">

<h1>Richard's QA Team Registration Form</h1>

<p>For new members of the QA Team - Please register your details.</p>
<hr>

<p/>
<form action="submitForm" method="post">
    <label for="firstName">First Name <input id="firstName" placeholder="First Name" type="text" /></label>

    <p/>
    <label for="lastName">Last Name</label>
    <input id="lastName" placeholder="Last Name" type="text" required/>
    <p/>
    <label for="email">Email address</label>
    <input id="email" pattern="^([a-zA-Z0-9_\-\.]+)@([a-zA-Z0-9_\-\.]+)\.([a-zA-Z]{2,5})$"
           placeholder="example@email.com"
           type="text"/>

    <p>Gender:</p>
    <label for="male">Male</label>
    <input id="male" name="gender" type="radio"/>
    <label for="female">Female</label>
    <input id="female" name="gender" type="radio"/>
    <label for="other">Other</label>
    <input id="other" name="gender" type="radio"/>
    <label for="pererNotToSay">Prefer Not to Say</label>
    <input id="pererNotToSay" name="gender" type="radio"/>
    <p/>
    <label for="mobileNumber">Mobile Number</label>
    <input id="mobileNumber" maxlength="10" minlength="10" pattern="\d{10}" type="text"/>
    <p/>
    <label for="dob">Date of birth</label>
    <input id="dob" type="date"/>

    <hr>
    <p/>
    <label for="skills">Testing Skills</label>
    <input id="skills" list="values" role="combobox" type="text"
           placeholder="Type and pick a skill"/>
    <datalist id="values">
        <option value="Playwright">
        <option value="Allure">
        <option value="Test Strategy">
        <option value="Test Planning">
        <option value="Java">
        <option value="JavaScript">
        <option value="JUnit">
        <option value="Jenkins">
        <option value="Jira">
        <option value="Selenium">
        <option value="Reporting">
    </datalist>
    <div id="selected-skills" style="margin-top:8px;"></div>
    <input type="hidden" id="skills-value" name="skills"/>
    <style>
        .chip {
            display: inline-block;
            padding: 2px 8px;
            margin: 2px;
            background: #e0e7ff;
            border-radius: 12px;
            font-size: 14px;
        }
        .chip button {
            border: none;
            background: transparent;
            cursor: pointer;
            margin-left: 4px;
            font-weight: bold;
        }
    </style>
    <script>
        (function () {
            const input    = document.getElementById('skills');
            const list     = document.getElementById('values');
            const display  = document.getElementById('selected-skills');
            const hidden   = document.getElementById('skills-value');
            const selected = new Set();

            function render() {
                display.innerHTML = '';
                selected.forEach(function (skill) {
                    const chip = document.createElement('span');
                    chip.className = 'chip';
                    chip.textContent = skill;
                    const x = document.createElement('button');
                    x.type = 'button';
                    x.textContent = '\u00d7';
                    x.onclick = function () { selected.delete(skill); render(); };
                    chip.appendChild(x);
                    display.appendChild(chip);
                });
                hidden.value = Array.from(selected).join(',');
            }

            input.addEventListener('input', function () {
                const match = Array.from(list.options).find(function (o) {
                    return o.value === input.value;
                });
                if (match && !selected.has(match.value)) {
                    selected.add(match.value);
                    input.value = '';
                    render();
                }
            });
        })();
    </script>
    <p/>
    <input id="cvUpload" name="cvUpload" type="file"/>
    <label for="cvUpload">Please upload your CV</label>                                                                                                                                                                                       ┃
    <hr>
    <h3>Address and Location Details</h3>
    <p/>
    <h3>Working Location Preferences</h3>
    <input id="officeFullTime" type="checkbox" value="officeFull"/>
    <label for="officeFullTime">Office fulltime</label>
    <input id="hybrid" type="checkbox" value="hybridWorking"/>
    <label for="hybrid">Hyrbid Working</label>
    <input id="fullyRemote" type="checkbox" value="remoteFully"/>
    <label for="fullyRemote">Fully Remote/Home Working</label>

    <p/>
    <label for="postalAddress">Current Postal Address</label>                                                                                                                                                                                 ┃
    <textarea cols="50" id="postalAddress" name="postalAddressTextBox" rows="4"                                                                                                                                                               ┃
              placeholder="Please enter your current postal address here, including house number, street name, city and postcode."></textarea>

    <p/>
    <label for="country">Country Where you Live</label>
    <select id="country">
        <option value="">Please Select</option>
        <option value="england">England</option>
        <option value="scotland">Scotland</option>
        <option value="wales">Wales</option>
        <option value="northernIreland">Northern Ireland</option>
    </select>

    <p/>
    <a href="confirm.html" class="button" role="button">Submit</a>
</form>
</body>
</html>
