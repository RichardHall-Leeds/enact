<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/html">
<head>
    <title>Richard's Registration Form</title>
</head>
<body bgcolor="red">

<h1>Richard's QA Team Registration Form</h1>

<p>For new members of the QA Team - Please register your details.</p>
<hr>

<p/>
<form action="submitForm" method="post">
    <label for="firstName">First Name</label>
    <input id="firstName" placeholder="First Name" type="text" disabled/>
    <p/>
    <label for="lastName">Last Name</label>
    <input id="lastName" placeholder="Last Name" type="text" required/>
    <p/>
    <label for="email">Email address</label>
    <input id="email" pattern="^([a-zA-Z0-9_\-\.]+)@([a-zA-Z0-9_\-\.]+)\.([a-zA-Z]{2,5})$"
           placeholder="example@email.com"
           type="text"/>

    <p>Gender:</p>
    <label for="male">Male</label>
    <input id="male" name="gender" type="radio"/>
    <label for="female">Female</label>
    <input id="female" name="gender" type="radio"/>
    <label for="other">Other</label>
    <input id="other" name="gender" type="radio"/>
    <p/>
    <label for="mobileNumber">Mobile Number</label>
    <input id="mobileNumber" maxlength="10" minlength="10" pattern="\d" type="text"/>
    <p/>
    <label for="dob">Date of birth</label>
    <input id="dob" type="date"/>

    <hr>
    <p/>
    <label for="skills">Testing Skills</label>
    <input id="skills" list="values" role="combobox" type="text"/>
    <datalist id="values">
        <option value="Playwright">
        <option value="Allure">
        <option value="Test Strategy">
        <option value="Test Planning">
        <option value="Java">
        <option value="JavaScript">
        <option value="Jnit">
        <option value="Jenkins">
        <option value="Jira">
        <option value="Selenium">
        <option value="Reporting">
    </datalist>
    <p>Please upload your CV</p>
    <input for="cvUpload" id="cvUpload" label name="cvUpload" type="file"/>
    <label for="cvUpload"></label>
    <hr>
    <h3>Address and Location Details</h3>
    <p/>
    <h3>Working Location Preferences</h3>
    <input id="officeFullTime" type="checkbox" value="officeFull"/>
    <label for="officeFullTime">Office fulltime</label>
    <input id="hybrid" type="checkbox" value="hybridWorking"/>
    <label for="hybrid">Hyrbid Working</label>
    <input id="fullyRemote" type="checkbox" value="remoteFully"/>
    <label for="fullyRemote">Fully Remote/Home Working</label>

    <p/>
    <label for="postalAddress">Current Postal Address: </label>
    <textarea cols="50" id="postalAddress" name="postalAddressTextBox" rows="4">
        Please enter your current postal address here, including house number, street name, city and postcode.
    </textarea>

    <p/>
    <label for="country">Country</label>
    <select id="country">
        <option value="">Please Select</option>
        <option value="england">England</option>
        <option value="scotland">Scotland</option>
        <option value="wales">Wales</option>
        <option value="northernIreland">Northern Ireland</option>
    </select>

    <p/>
    <input type="submit" value="Submit"/>

</form>
</body>
</html>
